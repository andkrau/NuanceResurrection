;The DVDBase option allows configuration of a directory path that is prepended to all file names passed to the
;media and filesystem routines.
;[DVDBase]
;c:/blah/

;Disabling can be faster, but will make some games buggy
[AudioInterrupts]
Enabled

;Enabling is always faster, but still has some few issues (see GameCompatibility.txt/MPE3PacketHack-option)
[DynamicCompiler]
Enabled

;Enabling is always faster and should be working nowadays, BUT if something does not work as expected, try to set this to Disabled first (and report the issue)!
[CompilerConstantPropagation]
Enabled

;Still buggy
[CompilerDeadCodeElimination]
Disabled

;When DumpCompiledBlocks is enabled, the compiler will keep logs of the compiled blocks for each processor
[DumpCompiledBlocks]
Disabled

;When enabled, MPE3's system-bus native blocks are compiled one packet at a time, so MPE3 yields to the other MPEs at per-packet granularity (matching disabled DynamicCompiler).
;This is needed for games with a tight cross-MPE handshake in MPE3 system-bus code (e.g. suspected for T3K's level select),
;which otherwise livelock/hang. Leave enabled, performance cost should be minimal
;(it's also possible to choose "T3K" for the minimal support/perf-impact version, i.e. to only resolve T3Ks level select hang)
[MPE3PacketHack]
Enabled

;Automatically triggers the Load Game / File button on startup
[AutomaticLoadPopup]
Enabled

;Use an approximate postprocessing CRT shader for display
[UseCRTshader]
Enabled

;Available bindings are DPAD_[UP,DOWN,LEFT,RIGHT], CPAD_[UP,DOWN,LEFT,RIGHT], A, L, R, NUON, and START.
